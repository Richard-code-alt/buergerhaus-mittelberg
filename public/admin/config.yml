          - { label: "Stüble — Bildunterschrift", name: "raeume_stueble_bild_caption", widget: "string", required: false }

          - { label: "── HOCHZEIT-TEASER ──", name: "_sep_hochzeit", widget: "string", required: false, default: "" }
          - { label: "Eyebrow", name: "hochzeit_eyebrow", widget: "string" }
          - { label: "Titel", name: "hochzeit_titel", widget: "string" }
          - { label: "Beschreibungstext", name: "hochzeit_text", widget: "text" }
          - { label: "Button-Text", name: "hochzeit_button", widget: "string" }

          - { label: "── TRAUUNG-BEREICH ──", name: "_sep_trauung", widget: "string", required: false, default: "" }
          - { label: "Eyebrow", name: "trauung_eyebrow", widget: "string" }
