          - { label: "Stat 3 — Beschreibung", name: "hero_stat_3_label", widget: "string" }
          - { label: "Hero-Bild (optional, sonst SVG-Platzhalter)", name: "hero_bild", widget: "image", required: false }
          - { label: "Hero-Bild — Beschreibung (für SEO)", name: "hero_bild_alt", widget: "string" }
          - { label: "Hero-Bild — Bildunterschrift", name: "hero_bild_caption", widget: "string", required: false }

          - { label: "── ANLÄSSE-TEASER ──", name: "_sep_anlaesse", widget: "string", required: false, default: "" }
