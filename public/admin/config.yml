backend:
  name: git-gateway
  branch: main

publish_mode: simple

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://www.buergerhaus-mittelberg.de
display_url: https://www.buergerhaus-mittelberg.de
logo_url: https://www.buergerhaus-mittelberg.de/logo.png

locale: de

collections:
  # =====================================================
  # 🏠 STARTSEITE — alle Texte und Bilder der Hauptseite
  # =====================================================
  - name: startseite
    label: "🏠 Startseite"
    delete: false
    editor:
      preview: false
    files:
      - name: startseite_inhalte
        label: "Startseite — Texte & Bilder"
        file: "src/data/seiten/startseite.json"
        fields:
          - { label: "── HERO-BEREICH (oben) ──", name: "_sep_hero", widget: "string", required: false, default: "" }
          - { label: "Eyebrow (kleine Zeile über Titel)", name: "hero_eyebrow", widget: "string" }
          - { label: "Titel — Zeile 1", name: "hero_titel_zeile_1", widget: "string" }
          - { label: "Titel — Zeile 2 Text (vor Akzent)", name: "hero_titel_zeile_2_text", widget: "string" }
          - { label: "Titel — Zeile 2 Akzent (groß)", name: "hero_titel_zeile_2_akzent", widget: "string" }
          - { label: "Untertitel / Lead-Text", name: "hero_lead", widget: "text" }
          - { label: "Button 1 (primär)", name: "hero_button_primaer", widget: "string" }
          - { label: "Button 2 (sekundär)", name: "hero_button_sekundaer", widget: "string" }
          - { label: "Stat 1 — Zahl", name: "hero_stat_1_zahl", widget: "string" }
